model: spoter
input_dim: 543
d_model: 256
nhead: 8
num_encoder_layers: 6
dim_feedforward: 512
dropout: 0.1
num_classes: 263

train:
  epochs: 150
  batch_size: 32
  lr: 1e-4
  weight_decay: 1e-4
  label_smoothing: 0.1
  grad_clip: 1.0
  scheduler: cosine
  warmup_epochs: 10

data:
  npy_dir: /content/drive/MyDrive/isl_project/data/keypoints/
  splits_dir: /content/drive/MyDrive/isl_project/data/splits/
  target_len: 64
  augment_train: true

checkpoint:
  dir: /content/drive/MyDrive/isl_project/checkpoints/spoter/
  save_every: 10
  save_best: true
